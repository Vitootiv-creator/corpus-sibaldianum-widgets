<style>*{margin:0;padding:0;box-sizing:border-box}:root{--gold:#C9A84C;--void:#2D2660;--deep:#231D54;--surface:#3D3B8E;--panel:#4A48A0;--border:#5550AA;--border-gold:rgba(201,168,76,.5);--text:#F0EAD6;--text-muted:#D4C9F0;--text-dim:#B8A9D4;}body{font-family:'Inter',sans-serif;background:var(--void);color:var(--text)}.w{padding:1.5rem;max-width:900px;margin:0 auto}.lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem}.lbl::after{content:'';flex:1;height:.5px;background:var(--border-gold)}.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:1px;background:var(--border)}.ac{background:var(--surface);padding:.7rem .6rem;cursor:pointer;transition:all .2s;text-align:center;position:relative}.ac:hover{background:var(--panel)}.ac:hover .an{color:var(--gold)}.ac:hover::after{content:'→';position:absolute;bottom:.35rem;right:.35rem;font-size:8px;color:var(--gold)}.anum{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;color:var(--gold);margin-bottom:3px}.an{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text);line-height:1.3;margin-bottom:3px;transition:color .2s}.at{font-size:8px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim)}.ad{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--text-muted);margin-top:3px}.ah{font-family:'Noto Serif Hebrew',serif;font-size:11px;color:var(--text-dim);margin-top:4px;direction:rtl;font-weight:300;opacity:.85}</style></head><body>
