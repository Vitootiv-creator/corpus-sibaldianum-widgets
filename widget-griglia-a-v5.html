(function(){
  var A=JSON.parse(document.getElementById('dati').textContent);
  var overlay=document.getElementById('overlay');

  document.getElementById('ag').innerHTML=A.map(function(a){
    return '<div class="ac" data-n="'+a.n+'">'+
      '<p class="anum">#'+a.n+'</p>'+
      '<p class="an">'+a.name+'</p>'+
      '<p class="at">'+a.epithet.replace(/.\u2019Angelo\s+\S+\s*/i,'').trim()+'</p>'+
      '<p class="ad">'+a.dates+'</p>'+
      '<p class="ah">'+a.heb+'</p>'+
      '</div>';
  }).join('');

  document.getElementById('ag').addEventListener('click',function(e){
    var card=e.target.closest('.ac');
    if(!card) return;
    var n=parseInt(card.dataset.n);
    var a=A.find(function(x){return x.n===n;});
    var corpusUrl=a.url_corpus||a.url;

    function ml(url,icon,label){
      if(url) return '<a href="'+url+'" target="_blank" class="ml on">'+icon+' '+label+'</a>';
      return '<span class="ml off">'+icon+' '+label+'</span>';
    }

    document.getElementById('modalNum').textContent='# '+a.n+' \u2014 '+a.dates;
    document.getElementById('modalName').textContent=a.name;
    document.getElementById('modalHeb').textContent=a.heb;
    document.getElementById('modalEpithet').textContent=a.epithet;
    document.getElementById('modalLinks').innerHTML=
      ml(a.url_anima,'\uD83C\uDF10','Anima-tv')+
      ml(corpusUrl,'\uD83D\uDCD6','Formato Corpus Sibaldianum')+
      ml(a.url_fonte,'\uD83D\uDCDC','Formato Fonte Antica')+
      ml(a.url_caso_c,'\uD83D\uDD04','Serie Storica \u2014 Marco Aurelio');

    overlay.classList.add('open');
  });

  document.getElementById('closeModal').addEventListener('click',function(){overlay.classList.remove('open');});
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.classList.remove('open');});

  function sendHeight(){
    var h=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight);
    window.parent.postMessage({type:'setHeight',height:h},'*');
  }
  window.addEventListener('load',function(){sendHeight();setTimeout(sendHeight,300);setTimeout(sendHeight,800);});
  window.addEventListener('resize',sendHeight);
})();
</script>
</body>
</html>
